chain:
  as: acm-interop-p2p-submariner-install
  steps:
    - ref: acm-interop-p2p-submariner-cloud-prepare
    - ref: acm-interop-p2p-submariner-broker-join
    - ref: acm-interop-p2p-submariner-verify
  documentation: |-
    Installs and verifies Submariner for a 1-hub + N-spoke cluster topology
    using Globalnet (overlapping CIDR support).

    This chain sequences three steps:
      1. acm-interop-p2p-submariner-cloud-prepare
         Installs subctl locally, prepares AWS security groups on each spoke
         (subctl cloud prepare aws with dedicated gateway nodes), and opens
         required IPsec/NAT-T firewall ports. AWS credentials are used only in
         this step and removed from disk on exit.

      2. acm-interop-p2p-submariner-broker-join
         Deploys the Submariner broker on the hub, joins all spokes, then waits
         for gateways, Globalnet, Lighthouse agent, Lighthouse CoreDNS, and
         OpenShift cluster CoreDNS DNS forwarding to be fully ready.

      3. acm-interop-p2p-submariner-verify
         Waits for IPsec tunnels to reach connected state, pre-warms the
         Globalnet/Lighthouse pipeline, and runs 'subctl verify' for tunnel
         and service-discovery tests.

    Each step installs its own subctl copy in /tmp/bin (never SHARED_DIR) to
    avoid the CI operator 3 MB SHARED_DIR serialisation limit.

    broker-info.subm is written to /tmp in step 2 and deleted on step exit.
    It is never written to SHARED_DIR.
