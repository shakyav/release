ref:
  as: acm-interop-p2p-submariner-broker-join
  from_image:
    namespace: ocp
    name: cli-jq
    tag: latest
  commands: acm-interop-p2p-submariner-broker-join-commands.sh
  resources:
    requests:
      cpu: 100m
      memory: 250Mi
  timeout: 1h0m0s
  grace_period: 10m0s
  documentation: |-
    Step 2 of 3 in the Submariner installation chain.

    Deploys the Submariner broker on the hub cluster, then joins each spoke
    to the broker using 'subctl join'. After all spokes have joined, waits in
    three ordered phases on each spoke:
      Phase 1 - submariner-operator Deployment Available
      Phase 2 - submariner-gateway DaemonSet exists (--for=create) and rolls out
      Phase 3 - submariner-routeagent DaemonSet (all-nodes routing, critical for
                 cross-cluster pod traffic), submariner-globalnet DaemonSet,
                 submariner-lighthouse-agent Deployment,
                 submariner-lighthouse-coredns Deployment
    Finally waits for OpenShift CoreDNS (dns-default) to include the
    Lighthouse clusterset.local stub zone on each spoke.

    Inputs from SHARED_DIR (written by submariner-cloud-prepare):
      subctl  - subctl binary

    Sensitive data handling:
      broker-info.subm is written to /tmp (never to SHARED_DIR) and removed
      via a trap on EXIT after all 'subctl join' calls complete.

    Env vars consumed:
      ACM_SPOKE_CLUSTER_COUNT  - number of spoke clusters (default: 2)
      KUBECONFIG               - hub cluster kubeconfig
      SHARED_DIR               - shared artifact directory
