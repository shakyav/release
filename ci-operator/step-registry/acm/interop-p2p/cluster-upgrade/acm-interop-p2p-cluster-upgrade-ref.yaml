ref:
  as: acm-interop-p2p-cluster-upgrade
  from_image:
    namespace: ocp
    name: cli-jq
    tag: latest
  commands: acm-interop-p2p-cluster-upgrade-commands.sh
  timeout: 6h0m0s
  resources:
    requests:
      cpu: '1'
      memory: 500Mi
  env:
  - name: TARGET_CHANNEL
    default: ""
  - name: ACM_UPGRADE_TIMEOUT
    default: "2h"
    documentation: Time to wait for clusterversion upgrade to complete. Accepts any oc wait time unit (e.g. 30m, 2h, 7200s).
  documentation: |-
    Upgrades the Hub cluster to the latest Release Candidate (RC) version.
    Cluster health check runs in the subsequent Step.