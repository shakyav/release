chain:
  as: acm-interop-p2p-submariner-install
  steps:
    - ref: acm-interop-p2p-submariner-cloud-prepare
    - ref: acm-interop-p2p-submariner-broker-join
    - ref: acm-interop-p2p-submariner-verify
  documentation: |-
    Installs and verifies Submariner for a 1-hub + 2-spoke cluster topology
    using Globalnet (overlapping CIDR support).

    This chain sequences three steps:
      1. acm-interop-p2p-submariner-cloud-prepare
         Downloads subctl and yq to SHARED_DIR, prepares AWS security groups on
         each spoke (subctl cloud prepare aws), and pre-labels one worker node per
         spoke as a Submariner gateway. AWS credentials are used only in this step
         and removed from disk on exit.

      2. acm-interop-p2p-submariner-broker-join
         Deploys the Submariner broker on the hub, joins both spokes, then waits
         for gateways, Globalnet, Lighthouse agent, Lighthouse CoreDNS, and
         OpenShift cluster CoreDNS DNS forwarding to be fully ready.

      3. acm-interop-p2p-submariner-verify
         Validates cross-cluster service discovery (nginx ClusterIP + headless
         canary) and runs 'subctl verify' for tunnel and service-discovery tests.

    Shared state between steps (via SHARED_DIR):
      subctl   - subctl binary (written by step 1, read by steps 2 and 3)
      yq       - yq binary     (written by step 1, read by step 3)

    broker-info.subm is written to /tmp in step 2 and deleted after all joins
    complete. It is never written to SHARED_DIR.
